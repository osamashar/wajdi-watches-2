<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1608"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Gold ring outer -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a96e" stroke-width="3" opacity="0.6"/>
  <!-- Gold ring inner -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.3"/>
  <!-- Watch body -->
  <ellipse cx="256" cy="256" rx="120" ry="130" fill="#0e0e10" stroke="#c9a96e" stroke-width="6"/>
  <!-- Watch face -->
  <ellipse cx="256" cy="256" rx="100" ry="110" fill="#060608"/>
  <!-- Hour markers -->
  <line x1="256" y1="152" x2="256" y2="168" stroke="#c9a96e" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="344" x2="256" y2="360" stroke="#c9a96e" stroke-width="4" stroke-linecap="round"/>
  <line x1="152" y1="256" x2="168" y2="256" stroke="#c9a96e" stroke-width="4" stroke-linecap="round"/>
  <line x1="344" y1="256" x2="360" y2="256" stroke="#c9a96e" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="196" stroke="#c9a96e" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="300" y2="236" stroke="#e8d5a3" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="7" fill="#c9a96e"/>
  <!-- Crown -->
  <rect x="365" y="240" width="18" height="32" rx="4" fill="#c9a96e"/>
  <!-- Strap top -->
  <rect x="220" y="118" width="72" height="40" rx="6" fill="#1a1a1d" stroke="#c9a96e" stroke-width="2"/>
  <!-- Strap bottom -->
  <rect x="220" y="354" width="72" height="40" rx="6" fill="#1a1a1d" stroke="#c9a96e" stroke-width="2"/>
  <!-- Arabic W letter hint -->
  <text x="256" y="270" font-family="serif" font-size="22" fill="#c9a96e" text-anchor="middle" opacity="0.4">و</text>
</svg>